apiVersion: apps/v1
kind: Deployment
metadata:
  name: fashion-api
  labels:
    app: fashion-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fashion-api
  template:
    metadata:
      labels:
        app: fashion-api
    spec:
      containers:
      - name: fashion-api
        image: fashion-ai:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
---
apiVersion: v1
kind: Service
metadata:
  name: fashion-api-service
spec:
  selector:
    app: fashion-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fashion-gradio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fashion-gradio
  template:
    metadata:
      labels:
        app: fashion-gradio
    spec:
      containers:
      - name: gradio
        image: fashion-ai:latest
        command: ["python", "week6_gradio/sketch2design_fix.py"]
        ports:
        - containerPort: 7860
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
---
apiVersion: v1
kind: Service
metadata:
  name: gradio-service
spec:
  selector:
    app: fashion-gradio
  ports:
  - port: 80
    targetPort: 7860
  type: LoadBalancer
